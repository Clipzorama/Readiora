<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="canonical" href="https://readiora.com/" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta
      name="description"
      content="Readiora is an AI-powered study workspace for notes, flashcards, quizzes, focused sessions, and exam preparation."
    />
    <meta name="theme-color" content="#070b13" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Readiora" />
    <meta property="og:title" content="Readiora | AI-Powered Study Workspace" />
    <meta
      property="og:description"
      content="Turn study material into focused notes, flashcards, quizzes, and exam preparation."
    />
    <meta property="og:url" content="https://readiora.com/" />
    <meta property="og:image" content="https://readiora.com/android-chrome-512x512.png" />
    <meta name="twitter:card" content="summary" />
    <title>Readiora | AI-Powered Study Workspace</title>
    <script>
      (() => {
        const storageKey = "readiora-theme";
        const validThemes = new Set(["light", "dark"]);
        let theme = "";

        try {
          theme = window.localStorage.getItem(storageKey) || "";
        } catch {
          theme = "";
        }

        if (!validThemes.has(theme)) {
          theme = window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
        }

        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
